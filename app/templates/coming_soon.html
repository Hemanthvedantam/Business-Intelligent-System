{% extends "base.html" %}
{% block title %}{{ feature_name }} — ABIP{% endblock %}
{% block breadcrumb %}{{ feature_name }}{% endblock %}

{% block content %}
<div style="
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    padding: 40px 24px;
">
    <!-- Icon -->
    <div style="
        width: 64px; height: 64px;
        background: var(--blue-light);
        border: 1px solid var(--blue-mid);
        border-radius: var(--radius-lg);
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; color: var(--blue);
        margin-bottom: 24px;
        box-shadow: var(--shadow);
    ">
        <i class="ti {{ feature_icon }}" aria-hidden="true"></i>
    </div>

    <!-- Heading -->
    <h1 style="
        font-family: 'Inter', sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
        margin-bottom: 10px;
    ">{{ feature_name }} is coming soon</h1>

    <!-- Description -->
    <p style="
        font-size: 14px;
        color: var(--text-3);
        max-width: 420px;
        line-height: 1.65;
        margin-bottom: 32px;
    ">{{ feature_description }}</p>

    <!-- CTA -->
    <a href="/dashboard" class="btn btn-primary btn-sm">
        <i class="ti ti-arrow-left" aria-hidden="true"></i>
        Back to Dashboard
    </a>
</div>
{% endblock %}
